<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Delivery Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #202020;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --lucas:  #6c63ff;
      --naqeeb: #ff9500;
      --rami:   #34c759;
      --felipe: #ff3b5c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 48px 32px;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    header p  { color: var(--muted); font-size: 14px; }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      flex-shrink: 0;
    }

    .filter-bar label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }

    .filter-bar input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }

    .filter-bar input[type="date"]:focus { border-color: #444; }
    .filter-sep { color: var(--muted); font-size: 13px; }

    .filter-btn {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .filter-btn:hover { background: #333; }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 1100px;
      margin: 0 auto 32px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .lucas-card::before  { background: var(--lucas); }
    .naqeeb-card::before { background: var(--naqeeb); }
    .rami-card::before   { background: var(--rami); }
    .felipe-card::before { background: var(--felipe); }

    .summary-card .editor-name { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

    .lucas-card  .editor-name { color: var(--lucas); }
    .naqeeb-card .editor-name { color: var(--naqeeb); }
    .rami-card   .editor-name { color: var(--rami); }
    .felipe-card .editor-name { color: var(--felipe); }

    .summary-card .big-number { font-size: 52px; font-weight: 800; line-height: 1; margin-bottom: 8px; letter-spacing: -2px; }
    .summary-card .sub-label  { color: var(--muted); font-size: 13px; }

    .summary-card .pod-breakdown { display: flex; gap: 16px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .pod-pill { font-size: 12px; color: var(--muted); }
    .pod-pill span { color: var(--text); font-weight: 600; }

    .bar-section {
      max-width: 1100px;
      margin: 0 auto 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 28px;
    }

    .bar-section h2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 20px; }

    .bar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { width: 80px; font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .lucas-fill  { background: var(--lucas); }
    .naqeeb-fill { background: var(--naqeeb); }
    .rami-fill   { background: var(--rami); }
    .felipe-fill { background: var(--felipe); }
    .bar-count { font-size: 14px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }

    .editors { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }

    .editor-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

    .editor-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .editor-header-left { display: flex; align-items: center; gap: 12px; }

    .editor-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .lucas-dot  { background: var(--lucas); }
    .naqeeb-dot { background: var(--naqeeb); }
    .rami-dot   { background: var(--rami); }
    .felipe-dot { background: var(--felipe); }

    .editor-title { font-size: 16px; font-weight: 700; }

    .editor-total { font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 99px; }
    .lucas-total  { background: rgba(108,99,255,0.15);  color: var(--lucas); }
    .naqeeb-total { background: rgba(255,149,0,0.15);   color: var(--naqeeb); }
    .rami-total   { background: rgba(52,199,89,0.15);   color: var(--rami); }
    .felipe-total { background: rgba(255,59,92,0.15);   color: var(--felipe); }

    .pod-tabs { display: flex; border-bottom: 1px solid var(--border); }

    .pod-tab {
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      user-select: none;
    }

    .pod-tab:hover { color: var(--text); }
    .lucas-tab.active  { color: var(--lucas);  border-bottom-color: var(--lucas); }
    .naqeeb-tab.active { color: var(--naqeeb); border-bottom-color: var(--naqeeb); }
    .rami-tab.active   { color: var(--rami);   border-bottom-color: var(--rami); }
    .felipe-tab.active { color: var(--felipe); border-bottom-color: var(--felipe); }

    .pod-content { display: none; }
    .pod-content.active { display: block; }

    .creative-list { padding: 4px 0; }

    .creative-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .creative-row:last-child { border-bottom: none; }
    .creative-row:hover { background: rgba(255,255,255,0.03); }
    .creative-row.hidden { display: none; }

    .creative-row-left { display: flex; align-items: center; gap: 14px; }
    .creative-num { font-size: 11px; color: var(--muted); width: 20px; text-align: right; flex-shrink: 0; }

    .creative-id {
      font-size: 14px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
      text-decoration: none;
      transition: color 0.15s;
    }

    .creative-id.has-link { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: #444; }
    .creative-id.has-link:hover { color: #aaa; text-decoration-color: #888; }

    .creative-right { display: flex; align-items: center; gap: 12px; }
    .creative-date  { font-size: 12px; color: var(--muted); white-space: nowrap; }

    .link-icon {
      opacity: 0;
      font-size: 11px;
      color: var(--muted);
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .creative-row:hover .link-icon { opacity: 1; }

    .month-divider {
      padding: 7px 24px 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }

    .month-divider.hidden { display: none; }
    .empty-pod { padding: 28px 24px; color: var(--muted); font-size: 13px; }
    .no-results { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; display: none; }
    .no-results.visible { display: block; }

    footer { max-width: 1100px; margin: 40px auto 0; color: var(--muted); font-size: 12px; text-align: center; }
  </style>
</head>

// ═══════════════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const EDITORS = [
  { key: 'lucas',   label: 'Lucas Krikorian' },
  { key: 'naqeeb',  label: 'Naqeeb' },
  { key: 'felipe',  label: 'Felipe' },
  { key: 'rami',    label: 'Rami Sleem' },
];

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ═══════════════════════════════════════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════════════════════════════════════
function fmt(dateStr) {
  const [, m, d] = dateStr.split('-');
  return MONTH_NAMES[+m - 1].slice(0, 3) + ' ' + +d;
}

function monthKey(dateStr) { return dateStr.slice(0, 7); } // 'YYYY-MM'

function monthLabel(mk) {
  const [y, m] = mk.split('-');
  return MONTH_NAMES[+m - 1] + ' ' + y;
}

function buildSummaryCards() {
  const el = document.getElementById('summary-cards');
  el.innerHTML = EDITORS.map(({ key, label }) => `
    <div class="summary-card ${key}-card">
      <div class="editor-name">${label}</div>
      <div class="big-number" id="${key}-count">0</div>
      <div class="sub-label">creatives delivered</div>
      <div class="pod-breakdown">
        <div class="pod-pill">Pod 1 <span id="${key}-p1-count">0</span></div>
        <div class="pod-pill">Pod 2 <span id="${key}-p2-count">0</span></div>
      </div>
    </div>`).join('');
}

function buildBarChart() {
  const el = document.getElementById('bar-chart');
  el.innerHTML = EDITORS.map(({ key, label }) => `
    <div class="bar-row">
      <div class="bar-label" style="color:var(--${key})">${label.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill ${key}-fill" id="bar-${key}" style="width:0%"></div></div>
      <div class="bar-count" id="bar-${key}-n">0</div>
    </div>`).join('');
}

function buildEditorSections() {
  const el = document.getElementById('editor-sections');
  el.innerHTML = EDITORS.map(({ key, label }) => {
    const items1 = DATA.filter(d => d.editor === key && d.pod === 1).sort((a,b) => a.date.localeCompare(b.date));
    const items2 = DATA.filter(d => d.editor === key && d.pod === 2).sort((a,b) => a.date.localeCompare(b.date));
    return `
    <div class="editor-section">
      <div class="editor-header">
        <div class="editor-header-left">
          <div class="editor-dot ${key}-dot"></div>
          <div class="editor-title">${label}</div>
        </div>
        <div class="editor-total ${key}-total" id="${key}-badge">0 creatives</div>
      </div>
      <div class="pod-tabs">
        <div class="pod-tab ${key}-tab active" onclick="switchTab(this,'${key}-p1')">Pod 1 — <span id="${key}-p1-tab-n">0</span></div>
        <div class="pod-tab ${key}-tab"        onclick="switchTab(this,'${key}-p2')">Pod 2 — <span id="${key}-p2-tab-n">0</span></div>
      </div>
      <div id="${key}-p1" class="pod-content active">
        <div class="creative-list">${buildList(items1, key, 'p1')}</div>
      </div>
      <div id="${key}-p2" class="pod-content">
        <div class="creative-list">${buildList(items2, key, 'p2')}</div>
      </div>
    </div>`;
  }).join('');
}

function buildList(items, editorKey, podKey) {
  if (!items.length) return `<div class="empty-pod">No submissions in this period.</div>`;

  let html = '';
  let lastMonth = null;

  items.forEach(item => {
    const mk = monthKey(item.date);
    if (mk !== lastMonth) {
      html += `<div class="month-divider" data-month="${mk}">${monthLabel(mk)}</div>`;
      lastMonth = mk;
    }
    const hasLink = !!item.link;
    const idEl = hasLink
      ? `<a class="creative-id has-link" href="${item.link}" target="_blank">${item.id}</a>`
      : `<span class="creative-id">${item.id}</span>`;
    const linkIcon = hasLink ? `<a class="link-icon" href="${item.link}" target="_blank">↗ Frame</a>` : '';
    html += `
      <div class="creative-row" data-date="${item.date}">
        <div class="creative-row-left"><span class="creative-num">·</span>${idEl}</div>
        <div class="creative-right"><span class="creative-date">${fmt(item.date)}</span>${linkIcon}</div>
      </div>`;
  });

  html += `<div class="no-results" id="${editorKey}-${podKey}-empty">No deliveries in this date range.</div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════════════════════
//  FILTER + COUNTS
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(clickedTab, contentId) {
  const section = clickedTab.closest('.editor-section');
  section.querySelectorAll('.pod-tab').forEach(t => t.classList.remove('active'));
  section.querySelectorAll('.pod-content').forEach(c => c.classList.remove('active'));
  clickedTab.classList.add('active');
  document.getElementById(contentId).classList.add('active');
}

function applyFilter() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) return;

  const fromDate = new Date(from);
  const toDate   = new Date(to);

  const fmtLabel = d => new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  document.getElementById('period-label').textContent =
    `${fmtLabel(from)} – ${fmtLabel(to)}  ·  Pods 1 & 2  ·  QC submissions only`;

  const counts = {};
  EDITORS.forEach(({ key }) => counts[key] = { p1:0, p2:0 });

  EDITORS.forEach(({ key }) => {
    [1, 2].forEach(pod => {
      const panelId = `${key}-p${pod}`;
      const panel   = document.getElementById(panelId);
      if (!panel) return;

      let visible = 0;
      panel.querySelectorAll('.creative-row').forEach(row => {
        const d = new Date(row.dataset.date);
        const show = d >= fromDate && d <= toDate;
        row.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      counts[key][`p${pod}`] = visible;

      panel.querySelectorAll('.month-divider').forEach(div => {
        let next = div.nextElementSibling, hasVisible = false;
        while (next && !next.classList.contains('month-divider')) {
          if (next.classList.contains('creative-row') && !next.classList.contains('hidden')) hasVisible = true;
          next = next.nextElementSibling;
        }
        div.classList.toggle('hidden', !hasVisible);
      });

      const emptyEl = document.getElementById(`${key}-p${pod}-empty`);
      if (emptyEl) emptyEl.classList.toggle('visible', visible === 0);
    });
  });

  updateCounts(counts);
}

function updateCounts(counts) {
  const totals = {};
  EDITORS.forEach(({ key }) => {
    const p1 = counts[key].p1, p2 = counts[key].p2, total = p1 + p2;
    totals[key] = total;
    document.getElementById(`${key}-count`).textContent      = total;
    document.getElementById(`${key}-p1-count`).textContent   = p1;
    document.getElementById(`${key}-p2-count`).textContent   = p2;
    document.getElementById(`${key}-badge`).textContent      = `${total} creatives`;
    document.getElementById(`${key}-p1-tab-n`).textContent   = p1;
    document.getElementById(`${key}-p2-tab-n`).textContent   = p2;
  });

  const max = Math.max(...Object.values(totals), 1);
  EDITORS.forEach(({ key }) => {
    document.getElementById(`bar-${key}`).style.width = (totals[key] / max * 100) + '%';
    document.getElementById(`bar-${key}-n`).textContent = totals[key];
  });
}

function resetFilter() {
  document.getElementById('date-from').value = '2025-12-01';
  document.getElementById('date-to').value   = '2026-03-17';
  applyFilter();
}

// ── Init ──────────────────────────────────────────────────────────────────
buildSummaryCards();
buildBarChart();
buildEditorSections();
applyFilter();
