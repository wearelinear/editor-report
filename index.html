<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Output Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #202020;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --lucas:   #6c63ff;
      --naqeeb:  #ff9500;
      --rami:    #34c759;
      --felipe:  #ff3b5c;
      --matt:    #0a84ff;
      --pilar:   #30d5c8;
      --ardee:   #bf5af2;
      --brunov:  #ffcc02;
      --rodrigo: #ff6b35;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 40px 32px; }

    /* ── Top bar ── */
    .top-bar {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .top-bar h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .top-bar p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* ── Controls row ── */
    .controls {
      max-width: 1100px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 14px;
    }

    .control-group label, .control-group .ctrl-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .ctrl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

    /* Date inputs */
    .control-group input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
      font-family: inherit;
    }
    .control-group input[type="date"]:focus { border-color: #444; }
    .filter-sep { color: var(--muted); font-size: 12px; }

    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }
    .ctrl-btn:hover { background: #2e2e2e; }
    .ctrl-btn.active { background: #2e2e2e; border-color: #555; color: #fff; }

    /* Pod toggles */
    .pod-toggle {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all 0.15s;
    }
    .pod-toggle.active { color: var(--text); border-color: #555; background: #2a2a2a; }
    .pod-toggle[data-pod="1"].active { color: #fff; background: #262626; border-color: #6c63ff55; box-shadow: 0 0 0 1px #6c63ff44 inset; }
    .pod-toggle[data-pod="2"].active { color: #fff; background: #262626; border-color: #ff950055; box-shadow: 0 0 0 1px #ff950044 inset; }
    .pod-toggle[data-pod="4"].active { color: #fff; background: #262626; border-color: #0a84ff55; box-shadow: 0 0 0 1px #0a84ff44 inset; }

    /* ── Summary cards ── */
    .summary {
      max-width: 1100px;
      margin: 0 auto 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }

    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s;
    }
    .summary-card.hidden { display: none; }

    .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .lucas-card::before  { background: var(--lucas); }
    .naqeeb-card::before { background: var(--naqeeb); }
    .rami-card::before   { background: var(--rami); }
    .felipe-card::before { background: var(--felipe); }
    .matt-card::before   { background: var(--matt); }
    .pilar-card::before  { background: var(--pilar); }
    .ardee-card::before  { background: var(--ardee); }
    .brunov-card::before { background: var(--brunov); }
    .rodrigo-card::before{ background: var(--rodrigo); }

    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .editor-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; }
    .lucas-card  .editor-name { color: var(--lucas); }
    .naqeeb-card .editor-name { color: var(--naqeeb); }
    .rami-card   .editor-name { color: var(--rami); }
    .felipe-card .editor-name { color: var(--felipe); }
    .matt-card   .editor-name { color: var(--matt); }
    .pilar-card  .editor-name { color: var(--pilar); }
    .ardee-card  .editor-name { color: var(--ardee); }
    .brunov-card .editor-name { color: var(--brunov); }
    .rodrigo-card .editor-name{ color: var(--rodrigo); }

    .role-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 99px; background: rgba(255,255,255,0.06); color: var(--muted); flex-shrink: 0; }

    .big-number { font-size: 40px; font-weight: 800; line-height: 1; letter-spacing: -2px; margin-bottom: 3px; }
    .sub-label  { color: var(--muted); font-size: 11px; }

    .pod-breakdown { display: flex; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .pod-pill { font-size: 11px; color: var(--muted); }
    .pod-pill span { color: var(--text); font-weight: 600; }

    /* ── Bar chart ── */
    .bar-section {
      max-width: 1100px;
      margin: 0 auto 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 22px;
    }
    .bar-section h2 { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }
    .bar-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-row.hidden { display: none; }
    .bar-label { width: 90px; font-size: 12px; font-weight: 600; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width 0.4s ease; min-width: 2px; }
    .lucas-fill   { background: var(--lucas); }
    .naqeeb-fill  { background: var(--naqeeb); }
    .rami-fill    { background: var(--rami); }
    .felipe-fill  { background: var(--felipe); }
    .matt-fill    { background: var(--matt); }
    .pilar-fill   { background: var(--pilar); }
    .ardee-fill   { background: var(--ardee); }
    .brunov-fill  { background: var(--brunov); }
    .rodrigo-fill { background: var(--rodrigo); }
    .bar-count { font-size: 13px; font-weight: 700; width: 28px; text-align: right; flex-shrink: 0; }

    /* ── Editor sections ── */
    .editors { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

    .editor-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: opacity 0.2s; }
    .editor-section.hidden { display: none; }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .editor-header:hover { background: rgba(255,255,255,0.02); }

    .editor-header-left { display: flex; align-items: center; gap: 10px; }
    .editor-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lucas-dot   { background: var(--lucas); }
    .naqeeb-dot  { background: var(--naqeeb); }
    .rami-dot    { background: var(--rami); }
    .felipe-dot  { background: var(--felipe); }
    .matt-dot    { background: var(--matt); }
    .pilar-dot   { background: var(--pilar); }
    .ardee-dot   { background: var(--ardee); }
    .brunov-dot  { background: var(--brunov); }
    .rodrigo-dot { background: var(--rodrigo); }

    .editor-title { font-size: 14px; font-weight: 700; }
    .editor-role  { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 7px; border-radius: 99px; }

    .editor-header-right { display: flex; align-items: center; gap: 10px; }
    .editor-total { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; }
    .lucas-total   { background: rgba(108,99,255,0.15);  color: var(--lucas); }
    .naqeeb-total  { background: rgba(255,149,0,0.15);   color: var(--naqeeb); }
    .rami-total    { background: rgba(52,199,89,0.15);   color: var(--rami); }
    .felipe-total  { background: rgba(255,59,92,0.15);   color: var(--felipe); }
    .matt-total    { background: rgba(10,132,255,0.15);  color: var(--matt); }
    .pilar-total   { background: rgba(48,213,200,0.15);  color: var(--pilar); }
    .ardee-total   { background: rgba(191,90,242,0.15);  color: var(--ardee); }
    .brunov-total  { background: rgba(255,204,2,0.15);   color: var(--brunov); }
    .rodrigo-total { background: rgba(255,107,53,0.15);  color: var(--rodrigo); }

    .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
    .editor-section.collapsed .chevron { transform: rotate(-90deg); }

    /* ── Body (collapsible) ── */
    .editor-body { border-top: 1px solid var(--border); }
    .editor-section.collapsed .editor-body { display: none; }

    .pod-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .pod-tab { padding: 9px 16px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
    .pod-tab:hover { color: var(--text); }
    .pod-tab.hidden { display: none; }
    .lucas-tab.active  { color: var(--lucas);  border-bottom-color: var(--lucas); }
    .naqeeb-tab.active { color: var(--naqeeb); border-bottom-color: var(--naqeeb); }
    .rami-tab.active   { color: var(--rami);   border-bottom-color: var(--rami); }
    .felipe-tab.active { color: var(--felipe); border-bottom-color: var(--felipe); }
    .pod-content { display: none; }
    .pod-content.active { display: block; }

    .creative-list { padding: 4px 0; }
    .creative-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 20px; border-bottom: 1px solid var(--border); transition: background 0.12s; }
    .creative-row:last-child { border-bottom: none; }
    .creative-row:hover { background: rgba(255,255,255,0.025); }
    .creative-row.hidden { display: none; }
    .creative-row-left { display: flex; align-items: center; gap: 12px; }
    .creative-num { font-size: 10px; color: var(--muted); width: 16px; text-align: right; flex-shrink: 0; }
    .creative-id { font-size: 13px; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); text-decoration: none; }
    .creative-id.has-link { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: #3a3a3a; }
    .creative-id.has-link:hover { color: #aaa; text-decoration-color: #666; }
    .creative-right { display: flex; align-items: center; gap: 10px; }
    .creative-date  { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .link-icon { opacity: 0; font-size: 10px; color: var(--muted); transition: opacity 0.12s; text-decoration: none; }
    .creative-row:hover .link-icon { opacity: 1; }

    .month-divider { padding: 5px 20px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); background: rgba(255,255,255,0.018); border-bottom: 1px solid var(--border); }
    .month-divider.hidden { display: none; }
    .empty-state { padding: 20px; color: var(--muted); font-size: 12px; text-align: center; }
    .no-results { padding: 16px; text-align: center; color: var(--muted); font-size: 12px; display: none; }
    .no-results.visible { display: block; }

    footer { max-width: 1100px; margin: 36px auto 0; color: var(--muted); font-size: 11px; text-align: center; }
  </style>
</head>

<div class="top-bar">
  <div>
    <h1>Creative Output Report</h1>
  </div>

<!-- Controls -->

    <span class="filter-sep">→</span>

    <button class="ctrl-btn" onclick="applyFilter()">Apply</button>
    <button class="ctrl-btn" onclick="resetFilter()">Reset</button>
  </div>

  <!-- Pod selector -->
  <div class="control-group">
    <span class="ctrl-label">Pod</span>
    <div class="ctrl-sep"></div>
    <button class="pod-toggle active" data-pod="1" onclick="togglePod(this)">Pod 1</button>

    <button class="pod-toggle active" data-pod="4" onclick="togglePod(this)">Pod 4</button>

  <!-- Presets -->
  <div class="control-group">
    <span class="ctrl-label">Quick</span>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn preset-btn" onclick="applyPreset('last7')">Last 7 days</button>
    <button class="ctrl-btn preset-btn" onclick="applyPreset('lastWeek')">Last week</button>
    <button class="ctrl-btn preset-btn" onclick="applyPreset('last30')">Last 30 days</button>
    <button class="ctrl-btn preset-btn" onclick="applyPreset('lastMonth')">Last month</button>
  </div>

  <!-- Expand / collapse all -->
  <div class="control-group">
    <button class="ctrl-btn" onclick="setAllCollapsed(false)">Expand all</button>
    <button class="ctrl-btn" onclick="setAllCollapsed(true)">Collapse all</button>
  </div>
</div>

<!-- Summary cards -->
<div class="summary" id="summary"></div>

<!-- Bar chart -->
<div class="bar-section">
  <h2>Volume Comparison</h2>
  <div id="bar-chart"></div>
</div>

<!-- Editor sections -->
<div class="editors" id="editors"></div>

// ═══════════════════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const EDITORS = [
  { key:'lucas',   label:'Lucas Krikorian', group:'p12' },
  { key:'naqeeb',  label:'Naqeeb',          group:'p12' },
  { key:'felipe',  label:'Felipe',           group:'p12', role:'designer' },
  { key:'rami',    label:'Rami Sleem',       group:'p12' },
  { key:'pilar',   label:'Pilar',            group:'p4',  role:'designer' },
  { key:'matt',    label:'Matt',             group:'p4' },
  { key:'ardee',   label:'Ardee',            group:'p4' },
  { key:'brunov',  label:'Bruno Volpe',      group:'p4' },
  { key:'rodrigo', label:'Rodrigo',          group:'p4' },
];

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

let activePods = new Set([1, 2, 4]);

// ═══════════════════════════════════════════════════════════════════════════
//  BUILD DOM
// ═══════════════════════════════════════════════════════════════════════════
function fmt(ds) { const [,m,d] = ds.split('-'); return MONTHS[+m-1].slice(0,3) + ' ' + +d; }
function monthKey(ds)   { return ds.slice(0,7); }
function monthLabel(mk) { const [y,m] = mk.split('-'); return MONTHS[+m-1] + ' ' + y; }

function buildList(items, key, podKey) {
  if (!items.length) return `<div class="empty-state">No submissions in this period.</div>`;
  let html = '', last = null;
  items.forEach(item => {
    const mk = monthKey(item.date);
    if (mk !== last) { html += `<div class="month-divider" data-month="${mk}">${monthLabel(mk)}</div>`; last = mk; }
    const idEl = item.link
      ? `<a class="creative-id has-link" href="${item.link}" target="_blank">${item.id}</a>`
      : `<span class="creative-id">${item.id}</span>`;
    const icon = item.link ? `<a class="link-icon" href="${item.link}" target="_blank">↗</a>` : '';
    html += `<div class="creative-row" data-date="${item.date}">
      <div class="creative-row-left"><span class="creative-num">·</span>${idEl}</div>
      <div class="creative-right"><span class="creative-date">${fmt(item.date)}</span>${icon}</div>
    </div>`;
  });
  html += `<div class="no-results" id="${key}-${podKey}-empty">No deliveries in this date range.</div>`;
  return html;
}

function render() {
  // Summary cards
  document.getElementById('summary').innerHTML = EDITORS.map(({ key, label, role, group }) => {
    const roleBadge = role ? `<span class="role-badge">${role}</span>` : '';
    const podBreak  = group === 'p12'
      ? `<div class="pod-breakdown"><div class="pod-pill">Pod 1 <span id="${key}-p1-count">0</span></div><div class="pod-pill">Pod 2 <span id="${key}-p2-count">0</span></div></div>`
      : '';
    return `<div class="summary-card ${key}-card" data-group="${group}">
      <div class="card-top"><div class="editor-name">${label}</div>${roleBadge}</div>
      <div class="big-number" id="${key}-count">0</div>
      <div class="sub-label">creatives delivered</div>
      ${podBreak}
    </div>`;
  }).join('');

  // Bar chart
  document.getElementById('bar-chart').innerHTML = EDITORS.map(({ key, label, group }) =>
    `<div class="bar-row" data-group="${group}">
      <div class="bar-label" style="color:var(--${key})">${label.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill ${key}-fill" id="bar-${key}" style="width:0%"></div></div>
      <div class="bar-count" id="bar-${key}-n">0</div>
    </div>`
  ).join('');

  // Editor sections
  document.getElementById('editors').innerHTML = EDITORS.map(({ key, label, role, group }) => {
    const roleTag = role ? `<span class="editor-role">${role}</span>` : '';
    let body;
    if (group === 'p12') {
      const i1 = DATA.filter(d => d.editor === key && d.pod === 1).sort((a,b) => a.date.localeCompare(b.date));
      const i2 = DATA.filter(d => d.editor === key && d.pod === 2).sort((a,b) => a.date.localeCompare(b.date));
      body = `<div class="pod-tabs">
          <div class="pod-tab ${key}-tab active" data-pod="1" onclick="switchTab(this,'${key}-p1')">Pod 1 — <span id="${key}-p1-tab-n">0</span></div>
          <div class="pod-tab ${key}-tab"        data-pod="2" onclick="switchTab(this,'${key}-p2')">Pod 2 — <span id="${key}-p2-tab-n">0</span></div>
        </div>
        <div id="${key}-p1" class="pod-content active"><div class="creative-list">${buildList(i1, key, 'p1')}</div></div>
        <div id="${key}-p2" class="pod-content"><div class="creative-list">${buildList(i2, key, 'p2')}</div></div>`;
    } else {
      const items = DATA.filter(d => d.editor === key).sort((a,b) => a.date.localeCompare(b.date));
      body = `<div class="creative-list">${buildList(items, key, 'all')}</div>`;
    }
    return `<div class="editor-section collapsed" data-key="${key}" data-group="${group}">
      <div class="editor-header" onclick="toggleSection(this.parentElement)">
        <div class="editor-header-left">
          <div class="editor-dot ${key}-dot"></div>
          <div class="editor-title">${label}</div>
          ${roleTag}
        </div>
        <div class="editor-header-right">
          <div class="editor-total ${key}-total" id="${key}-badge">0 creatives</div>
          <span class="chevron">›</span>
        </div>
      </div>
      <div class="editor-body">${body}</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════════════════════════════════
function toggleSection(el) { el.classList.toggle('collapsed'); }
function setAllCollapsed(val) { document.querySelectorAll('.editor-section:not(.hidden)').forEach(s => s.classList.toggle('collapsed', val)); }

function switchTab(tab, contentId) {
  const section = tab.closest('.editor-section');
  section.querySelectorAll('.pod-tab').forEach(t => t.classList.remove('active'));
  section.querySelectorAll('.pod-content').forEach(c => c.classList.remove('active'));
  tab.classList.add('active');
  document.getElementById(contentId).classList.add('active');
}

function togglePod(btn) {
  const pod = +btn.dataset.pod;
  if (activePods.has(pod)) {
    if (activePods.size === 1) return; // keep at least one
    activePods.delete(pod);
    btn.classList.remove('active');
  } else {
    activePods.add(pod);
    btn.classList.add('active');
  }
  syncPodVisibility();
  applyFilter();
}

function syncPodVisibility() {
  const showP12 = activePods.has(1) || activePods.has(2);
  const showP4  = activePods.has(4);

  // Cards & bar rows
  document.querySelectorAll('[data-group]').forEach(el => {
    const g = el.dataset.group;
    el.classList.toggle('hidden', g === 'p12' ? !showP12 : !showP4);
  });

  // Pod tabs within P12 editors — show/hide individual tabs
  EDITORS.filter(e => e.group === 'p12').forEach(({ key }) => {
    const sec = document.querySelector(`.editor-section[data-key="${key}"]`);
    if (!sec) return;
    sec.querySelectorAll('.pod-tab').forEach(tab => {
      const p = +tab.dataset.pod;
      const visible = activePods.has(p);
      tab.classList.toggle('hidden', !visible);
      // If active tab is now hidden, switch to first visible
      if (!visible && tab.classList.contains('active')) {
        const firstVisible = sec.querySelector('.pod-tab:not(.hidden)');
        if (firstVisible) firstVisible.click();
      }
    });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════════════════════════════════════
function applyFilter() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) return;
  const fromDate = new Date(from), toDate = new Date(to);

  const counts = {};
  EDITORS.forEach(({ key }) => counts[key] = { p1:0, p2:0, p4:0 });

  // Filter rows; only count pods that are active
  document.querySelectorAll('.creative-row').forEach(row => {
    const d = new Date(row.dataset.date);
    row.classList.toggle('hidden', d < fromDate || d > toDate);
  });

  EDITORS.forEach(({ key, group }) => {
    const sec = document.querySelector(`.editor-section[data-key="${key}"]`);
    if (!sec) return;
    if (group === 'p12') {
      [1, 2].forEach(pod => {
        const panel = document.getElementById(`${key}-p${pod}`);
        if (!panel) return;
        let vis = 0;
        // Only count if pod is active
        if (activePods.has(pod)) {
          panel.querySelectorAll('.creative-row').forEach(r => { if (!r.classList.contains('hidden')) vis++; });
        }
        counts[key][`p${pod}`] = vis;
        refreshDividers(panel);
        const empty = document.getElementById(`${key}-p${pod}-empty`);
        if (empty) empty.classList.toggle('visible', vis === 0 && activePods.has(pod));
      });
    } else {
      let vis = 0;
      if (activePods.has(4)) {
        sec.querySelectorAll('.creative-row').forEach(r => { if (!r.classList.contains('hidden')) vis++; });
      }
      counts[key].p4 = vis;
      refreshDividers(sec);
      const empty = document.getElementById(`${key}-all-empty`);
      if (empty) empty.classList.toggle('visible', vis === 0 && activePods.has(4));
    }
  });

  updateCounts(counts);
}

function refreshDividers(container) {
  container.querySelectorAll('.month-divider').forEach(div => {
    let next = div.nextElementSibling, hasVis = false;
    while (next && !next.classList.contains('month-divider')) {
      if (next.classList.contains('creative-row') && !next.classList.contains('hidden')) hasVis = true;
      next = next.nextElementSibling;
    }
    div.classList.toggle('hidden', !hasVis);
  });
}

function updateCounts(counts) {
  // Compute totals
  const totals = {};
  EDITORS.forEach(({ key, group }) => {
    totals[key] = group === 'p12'
      ? (activePods.has(1) ? counts[key].p1 : 0) + (activePods.has(2) ? counts[key].p2 : 0)
      : counts[key].p4;
  });

  EDITORS.forEach(({ key, group }) => {
    const t = totals[key];
    document.getElementById(`${key}-count`).textContent = t;
    document.getElementById(`${key}-badge`).textContent = `${t} creatives`;
    if (group === 'p12') {
      document.getElementById(`${key}-p1-count`).textContent = counts[key].p1;
      document.getElementById(`${key}-p2-count`).textContent = counts[key].p2;
      document.getElementById(`${key}-p1-tab-n`).textContent = counts[key].p1;
      document.getElementById(`${key}-p2-tab-n`).textContent = counts[key].p2;
    }
  });

  // Bar chart — scale against all visible editors together
  const max = Math.max(...EDITORS.map(e => totals[e.key]), 1);
  EDITORS.forEach(({ key }) => {
    document.getElementById(`bar-${key}`).style.width = (totals[key] / max * 100) + '%';
    document.getElementById(`bar-${key}-n`).textContent = totals[key];
  });
}

function resetFilter() {
  document.getElementById('date-from').value = '2025-12-01';
  document.getElementById('date-to').value   = '2026-03-17';
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  applyFilter();
}

function applyPreset(preset) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let from, to;

  if (preset === 'last7') {
    to   = new Date(today);
    from = new Date(today); from.setDate(from.getDate() - 6);

  } else if (preset === 'lastWeek') {
    // Mon–Sun of the previous week
    const day = today.getDay(); // 0=Sun
    const diffToLastMon = day === 0 ? 6 : day - 1 + 7;
    from = new Date(today); from.setDate(today.getDate() - diffToLastMon);
    to   = new Date(from);  to.setDate(from.getDate() + 6);

  } else if (preset === 'last30') {
    to   = new Date(today);
    from = new Date(today); from.setDate(from.getDate() - 29);

  } else if (preset === 'lastMonth') {
    from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    to   = new Date(today.getFullYear(), today.getMonth(), 0);
  }

  const pad = n => String(n).padStart(2, '0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

  document.getElementById('date-from').value = fmt(from);
  document.getElementById('date-to').value   = fmt(to);

  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.preset-btn[onclick="applyPreset('${preset}')"]`).classList.add('active');

  applyFilter();
}

// Clear active preset if dates are edited manually
document.getElementById('date-from').addEventListener('change', () => document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active')));
document.getElementById('date-to').addEventListener('change',   () => document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active')));

// ── Init ──────────────────────────────────────────────────────────────────
render();
syncPodVisibility();
applyFilter();
</script>
