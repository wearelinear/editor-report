<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Delivery Report</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #202020;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      /* Pods 1 & 2 */
      --lucas:  #6c63ff;
      --naqeeb: #ff9500;
      --rami:   #34c759;
      --felipe: #ff3b5c;
      /* Pod 4 */
      --matt:   #0a84ff;
      --pilar:  #30d5c8;
      --ardee:  #bf5af2;
      --brunov: #ffcc02;
      --rodrigo:#ff6b35;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 48px 32px; }

    /* ── Header ── */
    header { max-width: 1100px; margin: 0 auto 32px; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
    header p  { color: var(--muted); font-size: 14px; }

    .filter-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; flex-shrink: 0; }
    .filter-bar label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
    .filter-bar input[type="date"] { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 5px 10px; cursor: pointer; outline: none; font-family: inherit; }
    .filter-bar input[type="date"]:focus { border-color: #444; }
    .filter-sep { color: var(--muted); font-size: 13px; }
    .filter-btn { background: #2a2a2a; border: 1px solid #3a3a3a; color: var(--text); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .filter-btn:hover { background: #333; }

    /* ── Section headers ── */
    .section-wrap { max-width: 1100px; margin: 0 auto 48px; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    /* ── Summary cards ── */
    .summary { display: grid; gap: 16px; margin-bottom: 24px; }
    .summary.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .summary.cols-5 { grid-template-columns: repeat(5, 1fr); }

    .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; position: relative; overflow: hidden; }
    .summary-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }

    .lucas-card::before  { background: var(--lucas); }
    .naqeeb-card::before { background: var(--naqeeb); }
    .rami-card::before   { background: var(--rami); }
    .felipe-card::before { background: var(--felipe); }
    .matt-card::before   { background: var(--matt); }
    .pilar-card::before  { background: var(--pilar); }
    .ardee-card::before  { background: var(--ardee); }
    .brunov-card::before { background: var(--brunov); }
    .rodrigo-card::before{ background: var(--rodrigo); }

    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .editor-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

    .lucas-card  .editor-name { color: var(--lucas); }
    .naqeeb-card .editor-name { color: var(--naqeeb); }
    .rami-card   .editor-name { color: var(--rami); }
    .felipe-card .editor-name { color: var(--felipe); }
    .matt-card   .editor-name { color: var(--matt); }
    .pilar-card  .editor-name { color: var(--pilar); }
    .ardee-card  .editor-name { color: var(--ardee); }
    .brunov-card .editor-name { color: var(--brunov); }
    .rodrigo-card .editor-name{ color: var(--rodrigo); }

    .role-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 7px; border-radius: 99px; background: rgba(255,255,255,0.07); color: var(--muted); }

    .big-number { font-size: 44px; font-weight: 800; line-height: 1; margin-bottom: 4px; letter-spacing: -2px; }
    .sub-label  { color: var(--muted); font-size: 12px; }

    .pod-breakdown { display: flex; gap: 14px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .pod-pill { font-size: 11px; color: var(--muted); }
    .pod-pill span { color: var(--text); font-weight: 600; }

    /* ── Bar chart ── */
    .bar-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
    .bar-section h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; }
    .bar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-label { width: 90px; font-size: 12px; font-weight: 600; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 7px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width 0.4s ease; }
    .lucas-fill  { background: var(--lucas); }
    .naqeeb-fill { background: var(--naqeeb); }
    .rami-fill   { background: var(--rami); }
    .felipe-fill { background: var(--felipe); }
    .matt-fill   { background: var(--matt); }
    .pilar-fill  { background: var(--pilar); }
    .ardee-fill  { background: var(--ardee); }
    .brunov-fill { background: var(--brunov); }
    .rodrigo-fill{ background: var(--rodrigo); }
    .bar-count { font-size: 13px; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }

    /* ── Editor sections ── */
    .editors { display: flex; flex-direction: column; gap: 20px; }

    .editor-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .editor-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .editor-header-left { display: flex; align-items: center; gap: 10px; }
    .editor-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .lucas-dot  { background: var(--lucas); }
    .naqeeb-dot { background: var(--naqeeb); }
    .rami-dot   { background: var(--rami); }
    .felipe-dot { background: var(--felipe); }
    .matt-dot   { background: var(--matt); }
    .pilar-dot  { background: var(--pilar); }
    .ardee-dot  { background: var(--ardee); }
    .brunov-dot { background: var(--brunov); }
    .rodrigo-dot{ background: var(--rodrigo); }

    .editor-title { font-size: 15px; font-weight: 700; }
    .editor-role  { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 99px; }
    .editor-total { font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 99px; }
    .lucas-total  { background: rgba(108,99,255,0.15);  color: var(--lucas); }
    .naqeeb-total { background: rgba(255,149,0,0.15);   color: var(--naqeeb); }
    .rami-total   { background: rgba(52,199,89,0.15);   color: var(--rami); }
    .felipe-total { background: rgba(255,59,92,0.15);   color: var(--felipe); }
    .matt-total   { background: rgba(10,132,255,0.15);  color: var(--matt); }
    .pilar-total  { background: rgba(48,213,200,0.15);  color: var(--pilar); }
    .ardee-total  { background: rgba(191,90,242,0.15);  color: var(--ardee); }
    .brunov-total { background: rgba(255,204,2,0.15);   color: var(--brunov); }
    .rodrigo-total{ background: rgba(255,107,53,0.15);  color: var(--rodrigo); }

    /* ── Pod tabs (Pods 1&2 only) ── */
    .pod-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .pod-tab { padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
    .pod-tab:hover { color: var(--text); }
    .lucas-tab.active  { color: var(--lucas);  border-bottom-color: var(--lucas); }
    .naqeeb-tab.active { color: var(--naqeeb); border-bottom-color: var(--naqeeb); }
    .rami-tab.active   { color: var(--rami);   border-bottom-color: var(--rami); }
    .felipe-tab.active { color: var(--felipe); border-bottom-color: var(--felipe); }
    .pod-content { display: none; }
    .pod-content.active { display: block; }

    /* ── Creative rows ── */
    .creative-list { padding: 4px 0; }
    .creative-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 22px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .creative-row:last-child { border-bottom: none; }
    .creative-row:hover { background: rgba(255,255,255,0.03); }
    .creative-row.hidden { display: none; }
    .creative-row-left { display: flex; align-items: center; gap: 12px; }
    .creative-num { font-size: 11px; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
    .creative-id { font-size: 13px; font-weight: 600; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--text); text-decoration: none; transition: color 0.15s; }
    .creative-id.has-link { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: #444; }
    .creative-id.has-link:hover { color: #aaa; text-decoration-color: #888; }
    .creative-right { display: flex; align-items: center; gap: 10px; }
    .creative-date  { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .link-icon { opacity: 0; font-size: 11px; color: var(--muted); transition: opacity 0.15s; text-decoration: none; }
    .creative-row:hover .link-icon { opacity: 1; }

    .month-divider { padding: 6px 22px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
    .month-divider.hidden { display: none; }
    .empty-pod  { padding: 24px 22px; color: var(--muted); font-size: 13px; }
    .no-results { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; display: none; }
    .no-results.visible { display: block; }

    footer { max-width: 1100px; margin: 40px auto 0; color: var(--muted); font-size: 12px; text-align: center; }

    @media (max-width: 900px) {
      .summary.cols-4, .summary.cols-5 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

const EDITORS = [
  // group:'p12' = uses Pod 1 / Pod 2 tabs
  { key:'lucas',   label:'Lucas Krikorian', group:'p12' },
  { key:'naqeeb',  label:'Naqeeb',          group:'p12' },

  { key:'brunov',  label:'Bruno Volpe',      group:'p4' },
  { key:'rodrigo', label:'Rodrigo',          group:'p4' },
];

const P12 = EDITORS.filter(e => e.group === 'p12');
const P4  = EDITORS.filter(e => e.group === 'p4');

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

// ═══════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function fmt(dateStr) {
  const [,m,d] = dateStr.split('-');
  return MONTH_NAMES[+m-1].slice(0,3) + ' ' + +d;
}
function monthKey(dateStr) { return dateStr.slice(0,7); }
function monthLabel(mk) {
  const [y,m] = mk.split('-');
  return MONTH_NAMES[+m-1] + ' ' + y;
}

// ═══════════════════════════════════════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════════════════════════════════════
function buildSection(editors, sectionLabel, sectionId) {
  const isPods12 = editors[0].group === 'p12';
  const cols     = editors.length <= 4 ? 'cols-4' : 'cols-5';

  // Summary cards
  const cards = editors.map(({ key, label, role }) => {
    const podBreakdown = isPods12
      ? `<div class="pod-breakdown">
           <div class="pod-pill">Pod 1 <span id="${key}-p1-count">0</span></div>
           <div class="pod-pill">Pod 2 <span id="${key}-p2-count">0</span></div>
         </div>`
      : '';
    const roleBadge = role ? `<span class="role-badge">${role}</span>` : '';
    return `
      <div class="summary-card ${key}-card">
        <div class="card-top">
          <div class="editor-name">${label}</div>
          ${roleBadge}
        </div>
        <div class="big-number" id="${key}-count">0</div>
        <div class="sub-label">creatives delivered</div>
        ${podBreakdown}
      </div>`;
  }).join('');

  // Bar chart
  const bars = editors.map(({ key, label }) => `
    <div class="bar-row">
      <div class="bar-label" style="color:var(--${key})">${label.split(' ')[0]}</div>
      <div class="bar-track"><div class="bar-fill ${key}-fill" id="bar-${key}" style="width:0%"></div></div>
      <div class="bar-count" id="bar-${key}-n">0</div>
    </div>`).join('');

  // Editor detail sections
  const editorSections = editors.map(({ key, label, role }) => buildEditorSection(key, label, role, isPods12)).join('');

  return `
    <div class="section-wrap">
      <div class="section-label">${sectionLabel}</div>
      <div class="summary ${cols}" id="${sectionId}-cards">${cards}</div>
      <div class="bar-section">
        <h2>Volume Comparison</h2>
        <div>${bars}</div>
      </div>
      <div class="editors">${editorSections}</div>
    </div>`;
}

function buildEditorSection(key, label, role, hasTabs) {
  const roleTag = role ? `<span class="editor-role">${role}</span>` : '';

  if (hasTabs) {
    const items1 = DATA.filter(d => d.editor === key && d.pod === 1).sort((a,b) => a.date.localeCompare(b.date));
    const items2 = DATA.filter(d => d.editor === key && d.pod === 2).sort((a,b) => a.date.localeCompare(b.date));
    return `
      <div class="editor-section">
        <div class="editor-header">
          <div class="editor-header-left">
            <div class="editor-dot ${key}-dot"></div>
            <div class="editor-title">${label}</div>
            ${roleTag}
          </div>
          <div class="editor-total ${key}-total" id="${key}-badge">0 creatives</div>
        </div>
        <div class="pod-tabs">
          <div class="pod-tab ${key}-tab active" onclick="switchTab(this,'${key}-p1')">Pod 1 — <span id="${key}-p1-tab-n">0</span></div>
          <div class="pod-tab ${key}-tab"        onclick="switchTab(this,'${key}-p2')">Pod 2 — <span id="${key}-p2-tab-n">0</span></div>
        </div>
        <div id="${key}-p1" class="pod-content active"><div class="creative-list">${buildList(items1, key, 'p1')}</div></div>
        <div id="${key}-p2" class="pod-content"><div class="creative-list">${buildList(items2, key, 'p2')}</div></div>
      </div>`;
  } else {
    const items = DATA.filter(d => d.editor === key).sort((a,b) => a.date.localeCompare(b.date));
    return `
      <div class="editor-section">
        <div class="editor-header">
          <div class="editor-header-left">
            <div class="editor-dot ${key}-dot"></div>
            <div class="editor-title">${label}</div>
            ${roleTag}
          </div>
          <div class="editor-total ${key}-total" id="${key}-badge">0 creatives</div>
        </div>
        <div class="creative-list">${buildList(items, key, 'all')}</div>
      </div>`;
  }
}

function buildList(items, editorKey, podKey) {
  if (!items.length) return `<div class="empty-pod">No submissions in this period.</div>`;
  let html = '', lastMonth = null;
  items.forEach(item => {
    const mk = monthKey(item.date);
    if (mk !== lastMonth) { html += `<div class="month-divider" data-month="${mk}">${monthLabel(mk)}</div>`; lastMonth = mk; }
    const idEl = item.link
      ? `<a class="creative-id has-link" href="${item.link}" target="_blank">${item.id}</a>`
      : `<span class="creative-id">${item.id}</span>`;
    const linkIcon = item.link ? `<a class="link-icon" href="${item.link}" target="_blank">↗ Frame</a>` : '';
    html += `
      <div class="creative-row" data-date="${item.date}">
        <div class="creative-row-left"><span class="creative-num">·</span>${idEl}</div>
        <div class="creative-right"><span class="creative-date">${fmt(item.date)}</span>${linkIcon}</div>
      </div>`;
  });
  html += `<div class="no-results" id="${editorKey}-${podKey}-empty">No deliveries in this date range.</div>`;
  return html;
}

function render() {
  document.getElementById('report-root').innerHTML =
    buildSection(P12, 'Pods 1 & 2  ·  #linear-pod-1-qc-requests  &  #linear-pod-2-qc-requests', 'p12') +
    buildSection(P4,  'Pod 4  ·  #linear-pod-4-creative-production', 'p4');
}

// ═══════════════════════════════════════════════════════════════════════════
//  FILTER + COUNTS
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(clickedTab, contentId) {
  const section = clickedTab.closest('.editor-section');
  section.querySelectorAll('.pod-tab').forEach(t => t.classList.remove('active'));
  section.querySelectorAll('.pod-content').forEach(c => c.classList.remove('active'));
  clickedTab.classList.add('active');
  document.getElementById(contentId).classList.add('active');
}

function applyFilter() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) return;
  const fromDate = new Date(from), toDate = new Date(to);

  const fmtLabel = d => new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  document.getElementById('period-label').textContent =
    `${fmtLabel(from)} – ${fmtLabel(to)}  ·  Pods 1, 2 & 4  ·  QC submissions only`;

  const counts = {};
  EDITORS.forEach(({ key }) => counts[key] = { p1:0, p2:0, p4:0 });

  // Filter all creative rows
  document.querySelectorAll('.creative-row').forEach(row => {
    const d = new Date(row.dataset.date);
    row.classList.toggle('hidden', d < fromDate || d > toDate);
  });

  // Recount per editor
  EDITORS.forEach(({ key, group }) => {
    if (group === 'p12') {
      [1, 2].forEach(pod => {
        const panel = document.getElementById(`${key}-p${pod}`);
        if (!panel) return;
        let vis = 0;
        panel.querySelectorAll('.creative-row').forEach(r => { if (!r.classList.contains('hidden')) vis++; });
        counts[key][`p${pod}`] = vis;
        refreshDividers(panel);
        const empty = document.getElementById(`${key}-p${pod}-empty`);
        if (empty) empty.classList.toggle('visible', vis === 0);
      });
    } else {
      // Pod 4 — single list
      const section = document.getElementById(`${key}-badge`)?.closest('.editor-section');
      if (!section) return;
      let vis = 0;
      section.querySelectorAll('.creative-row').forEach(r => { if (!r.classList.contains('hidden')) vis++; });
      counts[key].p4 = vis;
      refreshDividers(section);
      const empty = document.getElementById(`${key}-all-empty`);
      if (empty) empty.classList.toggle('visible', vis === 0);
    }
  });

  updateCounts(counts);
}

function refreshDividers(container) {
  container.querySelectorAll('.month-divider').forEach(div => {
    let next = div.nextElementSibling, hasVisible = false;
    while (next && !next.classList.contains('month-divider')) {
      if (next.classList.contains('creative-row') && !next.classList.contains('hidden')) hasVisible = true;
      next = next.nextElementSibling;
    }
    div.classList.toggle('hidden', !hasVisible);
  });
}

function updateCounts(counts) {
  // Pods 1&2 editors
  P12.forEach(({ key }) => {
    const p1 = counts[key].p1, p2 = counts[key].p2, total = p1 + p2;
    document.getElementById(`${key}-count`).textContent    = total;
    document.getElementById(`${key}-p1-count`).textContent = p1;
    document.getElementById(`${key}-p2-count`).textContent = p2;
    document.getElementById(`${key}-badge`).textContent    = `${total} creatives`;
    document.getElementById(`${key}-p1-tab-n`).textContent = p1;
    document.getElementById(`${key}-p2-tab-n`).textContent = p2;
  });

  // Pod 4 editors
  P4.forEach(({ key }) => {
    const total = counts[key].p4;
    document.getElementById(`${key}-count`).textContent = total;
    document.getElementById(`${key}-badge`).textContent = `${total} creatives`;
  });

  // Bar charts — calculated within each group independently
  const maxP12 = Math.max(...P12.map(({ key }) => counts[key].p1 + counts[key].p2), 1);
  P12.forEach(({ key }) => {
    const t = counts[key].p1 + counts[key].p2;
    document.getElementById(`bar-${key}`).style.width = (t / maxP12 * 100) + '%';
    document.getElementById(`bar-${key}-n`).textContent = t;
  });

  const maxP4 = Math.max(...P4.map(({ key }) => counts[key].p4), 1);
  P4.forEach(({ key }) => {
    const t = counts[key].p4;
    document.getElementById(`bar-${key}`).style.width = (t / maxP4 * 100) + '%';
    document.getElementById(`bar-${key}-n`).textContent = t;
  });
}

function resetFilter() {
  document.getElementById('date-from').value = '2025-12-01';
  document.getElementById('date-to').value   = '2026-03-17';
  applyFilter();
}

// ── Init ──────────────────────────────────────────────────────────────────
render();
applyFilter();
</script>
</body>
</html>
